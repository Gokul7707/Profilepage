<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-label="Gokul Srinivasan  AI and Data Science Engineer">
  <defs>
    <linearGradient id="spaceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="45%" stop-color="#0f1834"/>
      <stop offset="100%" stop-color="#0a1a2e"/>
    </linearGradient>
    <radialGradient id="nebula" cx="72%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="220" fill="url(#spaceBg)"/>
  <rect width="1200" height="220" fill="url(#nebula)"/>

  <!-- static star field -->
  <g fill="#eaf0ff" opacity="0.55">
    <circle cx="48" cy="32" r="1.2"/><circle cx="112" cy="18" r="0.9"/><circle cx="178" cy="44" r="1.4"/>
    <circle cx="256" cy="22" r="1"/><circle cx="318" cy="56" r="1.1"/><circle cx="402" cy="14" r="0.8"/>
    <circle cx="488" cy="38" r="1.3"/><circle cx="560" cy="62" r="0.9"/><circle cx="640" cy="20" r="1"/>
    <circle cx="720" cy="48" r="1.2"/><circle cx="810" cy="26" r="0.7"/><circle cx="892" cy="58" r="1.1"/>
    <circle cx="968" cy="16" r="1"/><circle cx="1054" cy="42" r="1.3"/><circle cx="1140" cy="28" r="0.9"/>
    <circle cx="86" cy="168" r="1"/><circle cx="164" cy="192" r="1.2"/><circle cx="248" cy="176" r="0.8"/>
    <circle cx="334" cy="204" r="1.1"/><circle cx="428" cy="182" r="1"/><circle cx="512" cy="198" r="0.9"/>
    <circle cx="688" cy="188" r="1.2"/><circle cx="776" cy="206" r="0.8"/><circle cx="864" cy="174" r="1"/>
    <circle cx="952" cy="196" r="1.1"/><circle cx="1038" cy="184" r="0.9"/><circle cx="1124" cy="202" r="1"/>
  </g>

  <!-- twinkling stars -->
  <g filter="url(#glow)">
    <circle cx="200" cy="70" r="1.6" fill="#fff">
      <animate attributeName="opacity" values="0.25;1;0.25" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="540" cy="90" r="1.4" fill="#89ddff">
      <animate attributeName="opacity" values="0.2;0.95;0.2" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="55" r="1.5" fill="#ffc98a">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1020" cy="120" r="1.2" fill="#eaf0ff">
      <animate attributeName="opacity" values="0.15;0.85;0.15" dur="4.1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- drifting stars -->
  <g>
    <circle r="1.3" fill="#89ddff" opacity="0">
      <animate attributeName="cx" values="-20;1220" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="40;95" dur="22s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="22s" repeatCount="indefinite"/>
    </circle>
    <circle r="1.1" fill="#eaf0ff" opacity="0">
      <animate attributeName="cx" values="1220;-20" dur="28s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="150;80" dur="28s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.75;0.75;0" dur="28s" repeatCount="indefinite"/>
    </circle>
    <line stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0">
      <animate attributeName="x1" values="-80;1180" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="30;110" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="-140;1120" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="35;115" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.85;0" dur="14s" repeatCount="indefinite"/>
    </line>
  </g>

  <text x="600" y="92" text-anchor="middle" fill="#c792ea" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="1">Gokul Srinivasan</text>
  <text x="600" y="128" text-anchor="middle" fill="#89ddff" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" letter-spacing="0.4">AI &amp; Data Science Engineer  Crafting intelligent systems that scale beautifully</text>
  <rect x="460" y="148" width="280" height="2" rx="1" fill="#a78bfa" opacity="0.45"/>
</svg>
