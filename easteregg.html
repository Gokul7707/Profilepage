<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easter Egg — Name Click Animation</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom right, #141E30, #243B55);
      color: white;
    }

    /* Clickable name trigger (from Goku.html sidebar profile) */
    .profile h1 {
      font-size: 1.5rem;
      margin: 0.5rem 0;
      color: #00E7FF;
      cursor: pointer;
    }

    /* Party Shower Animation */
    .party-shower {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      display: none;
      z-index: 999;
    }

    .confetti {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: confettiFall 1.5s infinite;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(-10px) rotate(0);
      }
      100% {
        transform: translateY(100vh) rotate(360deg);
      }
    }

    .secret-message {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #FFD700;
      padding: 10px 15px;
      font-size: 1.2rem;
      color: white;
      border-radius: 5px;
      display: none;
      z-index: 1001;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .secret-message:hover {
      background: #32CD32; /* Green hover effect */
    }
  </style>
</head>
<body>
  <div class="profile">
    <h1 id="gokuName">Goku</h1>
    <p style="color: rgba(255,255,255,0.6); font-size: 0.9rem;">Click the name to trigger the easter egg</p>
  </div>

  <!-- Party Shower -->
  <div id="partyShower" class="party-shower"></div>

  <!-- Secret Message -->
  <div id="secretMessage" class="secret-message">👏 Hidden Easter egg unlocked</div>

  <script>
    const gokuName = document.getElementById('gokuName');
    const partyShower = document.getElementById('partyShower');
    const secretMessage = document.getElementById('secretMessage');

    // Trigger party and secret message on Goku profile click
    gokuName.addEventListener('click', () => {
      partyShower.style.display = 'block';
      for (let i = 0; i < 100; i++) {
        const confetti = document.createElement('div');
        confetti.classList.add('confetti');
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.top = Math.random() * 100 + 'vh';
        confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
        confetti.style.animationDelay = Math.random() * 2 + 's';
        partyShower.appendChild(confetti);
      }

      secretMessage.style.display = 'block';
      setTimeout(() => {
        partyShower.innerHTML = '';
        partyShower.style.display = 'none';
        secretMessage.style.display = 'none';
      }, 3000);
    });
  </script>
</body>
</html>
